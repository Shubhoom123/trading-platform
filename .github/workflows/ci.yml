name: ci

on:
  push:
  pull_request:

jobs:
  matching-engine-cpp:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install gRPC + Kafka toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler-grpc libgrpc++-dev libprotobuf-dev librdkafka-dev
      - name: Configure
        run: cmake -B matching-engine-cpp/build -S matching-engine-cpp -DCMAKE_BUILD_TYPE=Release
      - name: Build
        # Builds the core engine, tests, benchmark, the gRPC server, AND the
        # Kafka bridge (librdkafka is present, so HAVE_KAFKA is defined).
        run: cmake --build matching-engine-cpp/build -j
      - name: Test
        # Runs both the zero-dependency engine_check and the GoogleTest suite.
        run: ctest --test-dir matching-engine-cpp/build --output-on-failure

  # Fastest possible signal: build + run the engine correctness check with just
  # g++, no CMake, no network, no test framework. Catches core regressions early.
  engine-check-nodeps:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Compile and run standalone check
        working-directory: matching-engine-cpp
        run: |
          g++ -std=c++20 -O2 -Isrc tests/standalone_check.cpp src/order_book.cpp -o engine_check
          ./engine_check

  api-service-java:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      # Generates gRPC stubs from ../proto, runs unit + Testcontainers tests.
      # Docker is available on GitHub-hosted runners, so Testcontainers works.
      - name: Build and test
        working-directory: api-service-java
        run: mvn -B verify

  gateway-go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install protoc + Go plugins
        working-directory: gateway-go
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          make tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate gRPC stubs
        working-directory: gateway-go
        run: make proto
      - name: Resolve dependencies
        working-directory: gateway-go
        run: go mod tidy
      - name: Vet
        working-directory: gateway-go
        run: go vet ./...
      - name: Test (race detector)
        working-directory: gateway-go
        run: go test -race ./...

  # Validates the Phase 6 Dockerfiles actually build (context = repo root).
  # The engine image compiles prometheus-cpp from source, so this is the slow one.
  docker-images:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f gateway-go/Dockerfile -t trading/gateway:ci .
      - name: Build api-service image
        run: docker build -f api-service-java/Dockerfile -t trading/api-service:ci .
      - name: Build matching-engine image
        run: docker build -f matching-engine-cpp/Dockerfile -t trading/matching-engine:ci .
      - name: Validate compose config
        run: docker compose -f infra/docker-compose.yml config >/dev/null

  # Full order lifecycle across all three services over the compose stack:
  # place an order via the API and assert the fill arrives on the gateway
  # WebSocket AND is persisted as FILLED. This is the heaviest job (it builds
  # every image, including the C++ engine), so it runs after the unit suites.
  e2e:
    runs-on: ubuntu-24.04
    needs: [matching-engine-cpp, api-service-java, gateway-go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run end-to-end test
        env:
          JWT_SECRET: e2e-ci-secret-0123456789abcdef0123456789
        run: bash infra/e2e/run_e2e.sh
