spring:
  application:
    name: api-service
  datasource:
    # No secrets in source control: everything comes from the environment.
    # See ../.env.example at the repo root for the required variables.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trading}
    username: ${DB_USER:trading}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      # Schema is owned by Flyway migrations, never by Hibernate auto-DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: all
    consumer:
      group-id: api-fill-updater
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer

server:
  port: ${API_PORT:8080}

# Kafka topics for the event-driven order flow (Phase 4). The API publishes
# Order protobufs to `orders` and consumes Fill protobufs from `fills`.
kafka:
  topics:
    orders: ${KAFKA_ORDERS_TOPIC:orders}
    fills: ${KAFKA_FILLS_TOPIC:fills}

# JWT signing. The secret MUST be provided via the environment in every
# non-local environment; the weak default exists only so `mvn test` and a first
# local boot work out of the box.
security:
  jwt:
    secret: ${JWT_SECRET:change-me-dev-only-do-not-use-in-prod-0123456789abcdef}
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
