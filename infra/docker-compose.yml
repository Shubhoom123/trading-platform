# Phase 4 local infrastructure: an event bus and the system-of-record DB.
#
# Redpanda is a single-binary, Kafka-API-compatible broker — lighter than a
# ZooKeeper/Kafka stack for local dev, and the services speak plain Kafka
# protocol so nothing is Redpanda-specific. Postgres is here too so the Java
# API has a database to point at. The application services (C++/Java/Go) run on
# the host in Phase 4 and connect to localhost; they get containerized in
# Phase 6.
#
#   docker compose -f infra/docker-compose.yml up -d
#
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Two listeners. 'internal' is what other containers use — it must be
      # advertised as the compose service name (redpanda), NOT localhost, or
      # in-container clients would be told to dial their own localhost. 'external'
      # is advertised as localhost:19092 for services run on the host.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: create the topics with symbol-friendly partitioning, then exit.
  # Partitioning by symbol (message key) is what lets the engine shard order
  # books across partitions later without reordering within a symbol.
  topic-init:
    image: redpandadata/redpanda:v24.2.4
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create orders --brokers redpanda:9092 -p 6 -r 1 || true
        rpk topic create fills  --brokers redpanda:9092 -p 6 -r 1 || true
        rpk topic list --brokers redpanda:9092

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Phase 5: hot cache for the gateway's book/quote reads. Ephemeral by design —
  # it only ever holds short-TTL snapshots, so no persistence volume.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- Application services (Phase 6) --------------------------------------
  # Built from each service's multi-stage Dockerfile. Build context is the repo
  # root (one level up) so the shared proto/ is available to every build.

  matching-engine:
    build:
      context: ..
      dockerfile: matching-engine-cpp/Dockerfile
    environment:
      ENGINE_GRPC_ADDR: "0.0.0.0:50051"
      ENGINE_METRICS_ADDR: "0.0.0.0:9101"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      KAFKA_ORDERS_TOPIC: "orders"
      KAFKA_FILLS_TOPIC: "fills"
    ports:
      - "50051:50051"
      - "9101:9101"
    depends_on:
      redpanda:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully

  api-service:
    build:
      context: ..
      dockerfile: api-service-java/Dockerfile
    environment:
      DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-trading}"
      DB_USER: "${POSTGRES_USER:-trading}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-trading}"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      KAFKA_ORDERS_TOPIC: "orders"
      KAFKA_FILLS_TOPIC: "fills"
      JWT_SECRET: "${JWT_SECRET:-dev-only-change-me-0123456789abcdef0123456789}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: gateway-go/Dockerfile
    environment:
      GATEWAY_LISTEN_ADDR: ":8090"
      ENGINE_GRPC_TARGET: "matching-engine:50051"
      API_BASE_URL: "http://api-service:8080"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      KAFKA_FILLS_TOPIC: "fills"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "${JWT_SECRET:-dev-only-change-me-0123456789abcdef0123456789}"
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      matching-engine:
        condition: service_started
      api-service:
        condition: service_started

  # ---- Observability (Phase 6) ---------------------------------------------

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - matching-engine
      - api-service
      - gateway

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # React trading terminal (static SPA served by nginx). Opt-in so it doesn't
  # slow the default `up`/e2e: bring it up with `docker compose --profile ui up`.
  # The browser reaches the gateway directly at localhost:8090 (CORS-enabled).
  frontend:
    build:
      context: ../frontend-web
      dockerfile: Dockerfile
    profiles: ["ui"]
    ports:
      - "3001:80"
    depends_on:
      - gateway

volumes:
  pgdata:
