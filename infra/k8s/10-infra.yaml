# Stateful / infrastructure dependencies: Postgres, Redis, Redpanda, and a Job
# that creates the topics. Single-replica Deployments are fine for local k3d /
# minikube; production would use StatefulSets + PersistentVolumeClaims.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: platform-config, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: platform-config, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: POSTGRES_PASSWORD } }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "trading"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        # emptyDir for local dev; swap for a PVC to persist across restarts.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: trading
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: trading
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: redpanda }
  template:
    metadata:
      labels: { app: redpanda }
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.4
          args:
            - redpanda
            - start
            - --smp=1
            - --overprovisioned
            - --node-id=0
            - --check=false
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
          ports:
            - containerPort: 9092
          readinessProbe:
            exec:
              command: ["sh", "-c", "rpk cluster health | grep -q 'Healthy:.*true'"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: trading
spec:
  selector: { app: redpanda }
  ports:
    - port: 9092
      targetPort: 9092
---
# One-shot topic creation. Retries until Redpanda is reachable.
apiVersion: batch/v1
kind: Job
metadata:
  name: topic-init
  namespace: trading
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: rpk
          image: redpandadata/redpanda:v24.2.4
          command: ["/bin/sh", "-c"]
          args:
            - |
              until rpk cluster health --brokers redpanda:9092 | grep -q 'Healthy:.*true'; do
                echo "waiting for redpanda..."; sleep 3;
              done
              rpk topic create orders --brokers redpanda:9092 -p 6 -r 1 || true
              rpk topic create fills  --brokers redpanda:9092 -p 6 -r 1 || true
              rpk topic list --brokers redpanda:9092
