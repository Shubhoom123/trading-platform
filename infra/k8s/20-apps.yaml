# The three application services. Images are built from each service's
# Dockerfile and loaded into the local cluster (see infra/k8s/README.md).
# Each service pulls shared wiring from platform-config / platform-secrets and
# overrides only what is specific to it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: matching-engine }
  template:
    metadata:
      labels: { app: matching-engine }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
    spec:
      containers:
        - name: matching-engine
          image: trading/matching-engine:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: ENGINE_GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: ENGINE_METRICS_ADDR
              value: "0.0.0.0:9101"
          ports:
            - { containerPort: 50051, name: grpc }
            - { containerPort: 9101, name: metrics }
          readinessProbe:
            tcpSocket: { port: 50051 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: trading
spec:
  selector: { app: matching-engine }
  ports:
    - { name: grpc, port: 50051, targetPort: 50051 }
    - { name: metrics, port: 9101, targetPort: 9101 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-service }
  template:
    metadata:
      labels: { app: api-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: api-service
          image: trading/api-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: DB_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
          ports:
            - { containerPort: 8080, name: http }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: trading
spec:
  selector: { app: api-service }
  ports:
    - { port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: trading
spec:
  replicas: 2
  selector:
    matchLabels: { app: gateway }
  template:
    metadata:
      labels: { app: gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: gateway
          image: trading/gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: platform-config }
          env:
            - name: GATEWAY_LISTEN_ADDR
              value: ":8090"
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
          ports:
            - { containerPort: 8090, name: http }
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: trading
spec:
  type: NodePort
  selector: { app: gateway }
  ports:
    - { port: 8090, targetPort: 8090 }
