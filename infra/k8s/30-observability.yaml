# Prometheus (with an inline scrape config) and Grafana (datasource
# auto-provisioned). The Grafana dashboard JSON is loaded from a ConfigMap
# created out-of-band — see infra/k8s/README.md — to keep this manifest small.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: trading
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: matching-engine
        static_configs:
          - targets: ["matching-engine:9101"]
      - job_name: api-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["api-service:8080"]
      - job_name: gateway
        static_configs:
          - targets: ["gateway:8090"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: trading
spec:
  selector: { app: prometheus }
  ports:
    - { port: 9090, targetPort: 9090 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: trading
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasource
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: datasource
          configMap: { name: grafana-datasource }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: trading
spec:
  type: NodePort
  selector: { app: grafana }
  ports:
    - { port: 3000, targetPort: 3000 }
